name: Build and Sysdig Pipeline Scan

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: vulnapp
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-scan:
    name: Build, Scan & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml -DskipTests

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_NAME }}:latest

      # -------------------------------------------------------------------
      # Sysdig Pipeline Scan
      # Requires: SYSDIG_SECURE_TOKEN secret set in repository settings
      # Optionally set SYSDIG_SECURE_URL for non-US regions, e.g.:
      #   https://eu1.app.sysdig.com  (EU)
      #   https://app.au1.sysdig.com  (AUS)
      # -------------------------------------------------------------------
      - name: Sysdig Secure Image Scan
        uses: sysdiglabs/scan-action@v6
        with:
          image-tag: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          sysdig-secure-token: ${{ secrets.SYSDIG_SECURE_TOKEN }}
          sysdig-secure-url: ${{ secrets.SYSDIG_SECURE_URL || 'https://secure.sysdig.com' }}
          # Stop the pipeline if the policy fails (flip to false to always pass)
          stop-on-failed-policy-eval: true
          # Upload SARIF results to GitHub Security tab
          severity-at-least: high
        id: sysdig-scan

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.sysdig-scan.outputs.sarifReport }}

      # Only push if scan passes (stop-on-failed-policy-eval=true gates this)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
